<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - DebugMate AI</title>
    <link rel="stylesheet" href="css/style.css?v=1783193493577">
    <script src="js/theme.js"></script>
</head>
<body>
    <div id="color-bends-bg"></div>

    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <div class="logo">🤖 DebugMate <span>AI</span></div>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-item" id="nav-dashboard"><a href="dashboard.html?v=1783191804496">📊 Dashboard</a></li>
                <li class="sidebar-item" id="nav-new-debug"><a href="debug.html?v=1783191804496">⚡ New Debug</a></li>
                <li class="sidebar-item" id="nav-history"><a href="history.html?v=1783191804496">⏳ History</a></li>
                <li class="sidebar-item" id="nav-profile"><a href="profile.html?v=1783191804496">👤 Profile</a></li>
                <li class="sidebar-item" id="nav-settings"><a href="settings.html?v=1783191804496">⚙️ Settings</a></li>
            </ul>
            <div class="sidebar-user">
                <div class="user-avatar">D</div>
                <div class="user-info">
                    <span class="user-name">Developer</span>
                    <span class="user-email">dev@debugmate.ai</span>
                </div>
                <button onclick="logout()" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:1.1rem; margin-left:auto;" title="Logout">🚪</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-navbar">
                <h1 class="page-title">Profile Account</h1>
            </div>

            <!-- Profile Settings Card -->
            <div class="glass-panel" style="max-width: 600px; padding: 40px; margin: 0 auto;">
                <div style="text-align: center; margin-bottom: 30px;">
                    <div class="user-avatar" style="width: 80px; height: 80px; font-size: 2.2rem; margin: 0 auto 16px; box-shadow: var(--glow-indigo);">D</div>
                    <h3 style="margin-bottom: 4px;">Edit Account Settings</h3>
                    <p id="profile-join-date" style="font-size: 0.85rem; color: var(--text-secondary);">Member since ...</p>
                </div>

                <form id="profile-form">
                    <div class="form-group">
                        <label for="profile-name">Full Name</label>
                        <input type="text" id="profile-name" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="profile-email">Email Address</label>
                        <input type="email" id="profile-email" class="form-input" required>
                    </div>

                    <!-- Password Update divider -->
                    <div style="margin: 32px 0 20px; border-top: 1px solid var(--border-glass); padding-top: 24px;">
                        <h4 style="margin-bottom: 8px;">Change Password</h4>
                        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 16px;">Leave both fields blank if you do not wish to change your password.</p>
                    </div>

                    <div class="form-group">
                        <label for="profile-current-pass">Current Password</label>
                        <input type="password" id="profile-current-pass" class="form-input" placeholder="••••••••">
                    </div>

                    <div class="form-group">
                        <label for="profile-new-pass">New Password</label>
                        <input type="password" id="profile-new-pass" class="form-input" placeholder="••••••••" minlength="6">
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; margin-top: 16px;">
                        Save Changes
                    </button>
                </form>
            </div>

        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.154.0/three.min.js"></script>
    <script src="js/colorBends.js?v=1783193493577"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
    </body>
</html>
